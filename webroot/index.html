<body class="dark:bg-black">
	<div id="app">
		<!-- <div class="main-container "></div> -->

		
		<script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
		<script>
			const now = new Date()
			const hour = now.getHours()
			const words = document.querySelectorAll('.loading-text-words')
			const theme = localStorage.theme

			if (theme) {
				if (theme === 'dark') {
					// document.body.style.backgroundColor = '#1F1F38'
					document.body.style.backgroundColor = '#15171A'
					for (let i = 0; i < words.length; i++) {
						const word = words[i]
						word.style.color = '#fff'
					}
				}

				if (theme === 'light') {
					document.body.style.backgroundColor = '#fff'
					for (let i = 0; i < words.length; i++) {
						const word = words[i]
						word.style.color = '#24272e'
					}
				}
			}
			else {
				if (!theme && hour >= 6 && hour <= 20) {
					document.body.style.backgroundColor = '#fff'
					for (let i = 0; i < words.length; i++) {
						const word = words[i]
						word.style.color = '#24272e'
					}
				}
				else {
					document.body.style.backgroundColor = '#1F1F38'
					for (let i = 0; i < words.length; i++) {
						const word = words[i]
						word.style.color = '#fff'
					}
				}
			}
		</script>
	</div>
</body>
